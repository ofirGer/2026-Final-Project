<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Arial, David, sans-serif">
  <rect width="1100" height="720" fill="white"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4E79" direction="rtl">תרשים מקרי שימוש (Use Case Diagram)</text>

  <!-- Actor (stick figure) -->
  <g transform="translate(110, 360)">
    <!-- Head -->
    <circle cx="0" cy="-30" r="14" fill="none" stroke="#1F4E79" stroke-width="2.5"/>
    <!-- Body -->
    <line x1="0" y1="-16" x2="0" y2="30" stroke="#1F4E79" stroke-width="2.5"/>
    <!-- Arms -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#1F4E79" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="0" y1="30" x2="-15" y2="60" stroke="#1F4E79" stroke-width="2.5"/>
    <line x1="0" y1="30" x2="15" y2="60" stroke="#1F4E79" stroke-width="2.5"/>
    <!-- Label -->
    <text x="0" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79" direction="rtl">Peer User</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#1F4E79" direction="rtl">(משתמש)</text>
  </g>

  <!-- System Boundary -->
  <rect x="220" y="80" width="850" height="560" rx="8" ry="8" fill="#fafafa" stroke="#999999" stroke-width="2"/>
  <text x="1050" y="105" text-anchor="end" font-size="14" font-weight="bold" fill="#1F4E79" direction="rtl">מערכת OG P2P Sharer</text>

  <!-- Use Cases Row 1 -->
  <ellipse cx="350" cy="170" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="350" y="175" text-anchor="middle" font-size="12" fill="#333" direction="rtl">הצטרפות לנחיל</text>

  <ellipse cx="600" cy="170" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" font-size="12" fill="#333" direction="rtl">שיתוף קובץ</text>

  <ellipse cx="850" cy="170" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="850" y="175" text-anchor="middle" font-size="12" fill="#333" direction="rtl">הסרת שיתוף</text>

  <!-- Use Cases Row 2 -->
  <ellipse cx="350" cy="280" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" font-size="12" fill="#333" direction="rtl">הורדת קובץ רגילה</text>

  <ellipse cx="600" cy="280" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="600" y="275" text-anchor="middle" font-size="12" fill="#333" direction="rtl">הורדת נחיל</text>
  <text x="600" y="293" text-anchor="middle" font-size="10" fill="#555">(Swarm Download)</text>

  <ellipse cx="850" cy="280" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="850" y="285" text-anchor="middle" font-size="12" fill="#333" direction="rtl">ביטול הורדה</text>

  <!-- Use Cases Row 3 -->
  <ellipse cx="350" cy="390" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="350" y="395" text-anchor="middle" font-size="12" fill="#333" direction="rtl">צפייה בלוח הבקרה</text>

  <ellipse cx="600" cy="390" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="600" y="395" text-anchor="middle" font-size="12" fill="#333" direction="rtl">פתיחת קובץ בדפדפן</text>

  <ellipse cx="850" cy="390" rx="100" ry="35" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="850" y="385" text-anchor="middle" font-size="12" fill="#333" direction="rtl">החלפת נחיל</text>
  <text x="850" y="403" text-anchor="middle" font-size="10" fill="#555">(Logout)</text>

  <!-- Auto Section Title -->
  <text x="640" y="470" text-anchor="middle" font-size="13" font-style="italic" fill="#666" direction="rtl">פעולות אוטומטיות (ברקע, ללא התערבות המשתמש):</text>

  <!-- Auto Use Cases -->
  <ellipse cx="450" cy="540" rx="115" ry="45" fill="#fff2cc" stroke="#d6b656" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="450" y="525" text-anchor="middle" font-size="10" font-style="italic" fill="#888">« auto »</text>
  <text x="450" y="545" text-anchor="middle" font-size="11" fill="#333" direction="rtl">שידור פעימות חיים</text>
  <text x="450" y="562" text-anchor="middle" font-size="10" fill="#666">(UDP Broadcast / 5s)</text>

  <ellipse cx="800" cy="540" rx="115" ry="45" fill="#fff2cc" stroke="#d6b656" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="800" y="525" text-anchor="middle" font-size="10" font-style="italic" fill="#888">« auto »</text>
  <text x="800" y="545" text-anchor="middle" font-size="11" fill="#333" direction="rtl">שליחת מקטעים</text>
  <text x="800" y="562" text-anchor="middle" font-size="10" fill="#666">(TCP Seeding)</text>

  <!-- Lines from actor to use cases (Row 1) -->
  <line x1="130" y1="350" x2="250" y2="170" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="350" x2="500" y2="170" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="350" x2="750" y2="170" stroke="#666" stroke-width="1.2"/>
  <!-- Lines to Row 2 -->
  <line x1="130" y1="360" x2="250" y2="280" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="360" x2="500" y2="280" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="360" x2="750" y2="280" stroke="#666" stroke-width="1.2"/>
  <!-- Lines to Row 3 -->
  <line x1="130" y1="370" x2="250" y2="390" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="370" x2="500" y2="390" stroke="#666" stroke-width="1.2"/>
  <line x1="130" y1="370" x2="750" y2="390" stroke="#666" stroke-width="1.2"/>

  <!-- Extend arrows -->
  <line x1="350" y1="200" x2="430" y2="500" stroke="#999" stroke-width="1.2" stroke-dasharray="6,4"/>
  <polygon points="430,500 425,495 425,505" fill="#999"/>
  <text x="390" y="370" font-size="10" font-style="italic" fill="#888" transform="rotate(75 390 370)">«extend»</text>

  <line x1="600" y1="200" x2="780" y2="500" stroke="#999" stroke-width="1.2" stroke-dasharray="6,4"/>
  <polygon points="780,500 775,495 775,505" fill="#999"/>
  <text x="680" y="370" font-size="10" font-style="italic" fill="#888" transform="rotate(60 680 370)">«extend»</text>

  <!-- Legend -->
  <rect x="320" y="615" width="460" height="55" rx="4" ry="4" fill="#f5f5f5" stroke="#cccccc"/>
  <text x="765" y="635" text-anchor="end" font-size="12" font-weight="bold" fill="#1F4E79" direction="rtl">מקרא:</text>
  <ellipse cx="340" cy="650" rx="12" ry="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="730" y="654" text-anchor="end" font-size="11" fill="#333" direction="rtl">מקרי שימוש פעילים (יזומים ע"י המשתמש)</text>
  <ellipse cx="340" cy="665" rx="12" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-dasharray="3,2"/>
  <text x="730" y="669" text-anchor="end" font-size="11" fill="#333" direction="rtl">פעולות אוטומטיות (ברקע)</text>
</svg>
