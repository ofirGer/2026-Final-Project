<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 980" font-family="Arial, David, sans-serif">
  <defs>
    <marker id="arBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1F4E79"/></marker>
    <marker id="arPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9673a6"/></marker>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#82b366"/></marker>
    <marker id="arRed2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#B85450"/></marker>
  </defs>
  <rect width="1240" height="980" fill="white"/>

  <text x="620" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F4E79" direction="rtl">זרימת מידע 2.3.2 — הורדת נחיל (Swarm Download)</text>

  <!-- Lifeline headers -->
  <g>
    <rect x="50" y="70" width="150" height="50" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="125" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Browser</text>
    <text x="125" y="110" text-anchor="middle" font-size="10" fill="#333">(User)</text>
    <line x1="125" y1="120" x2="125" y2="940" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="6,4"/>

    <rect x="240" y="70" width="150" height="50" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="315" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">WebUI</text>
    <text x="315" y="110" text-anchor="middle" font-size="10" fill="#333">(Flask)</text>
    <line x1="315" y1="120" x2="315" y2="940" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="6,4"/>

    <rect x="430" y="70" width="160" height="50" rx="6" ry="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="510" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">TCPClient</text>
    <text x="510" y="108" text-anchor="middle" font-size="10" fill="#333">ThreadPool (5w)</text>
    <line x1="510" y1="120" x2="510" y2="940" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="6,4"/>

    <rect x="640" y="70" width="150" height="50" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="715" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Seeder 1</text>
    <text x="715" y="108" text-anchor="middle" font-size="10" fill="#333">.10:50001</text>
    <line x1="715" y1="120" x2="715" y2="940" stroke="#82b366" stroke-width="1.5" stroke-dasharray="6,4"/>

    <rect x="840" y="70" width="150" height="50" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="915" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Seeder 2</text>
    <text x="915" y="108" text-anchor="middle" font-size="10" fill="#333">.11:50001</text>
    <line x1="915" y1="120" x2="915" y2="940" stroke="#82b366" stroke-width="1.5" stroke-dasharray="6,4"/>

    <rect x="1050" y="70" width="140" height="50" rx="6" ry="6" fill="#f8cecc" stroke="#B85450" stroke-width="2"/>
    <text x="1120" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Disk</text>
    <text x="1120" y="108" text-anchor="middle" font-size="10" fill="#333">.part file</text>
    <line x1="1120" y1="120" x2="1120" y2="940" stroke="#B85450" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Step 1: User → Flask -->
  <line x1="125" y1="160" x2="305" y2="160" stroke="#1F4E79" stroke-width="2" marker-end="url(#arBlue)"/>
  <text x="215" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">1. POST /download (file_id)</text>

  <!-- Note 2 -->
  <rect x="240" y="175" width="150" height="38" rx="4" ry="4" fill="#fff8e1" stroke="#d6b656"/>
  <text x="315" y="190" text-anchor="middle" font-size="9" fill="#555" direction="rtl">2. אתר peers שמחזיקים</text>
  <text x="315" y="205" text-anchor="middle" font-size="9" fill="#555" direction="rtl">file_id; הפעל Thread נפרד</text>

  <!-- Step 3: Flask → ThreadPool -->
  <line x1="315" y1="240" x2="500" y2="240" stroke="#9673a6" stroke-width="2" marker-end="url(#arPurple)"/>
  <text x="408" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#9673a6">3. start workers</text>

  <!-- Step 4: ThreadPool → Disk truncate -->
  <line x1="510" y1="275" x2="1110" y2="275" stroke="#B85450" stroke-width="2" marker-end="url(#arRed2)"/>
  <text x="810" y="267" text-anchor="middle" font-size="11" font-weight="bold" fill="#B85450">4. truncate(size) — pre-allocate full file</text>

  <!-- Par frame -->
  <rect x="420" y="305" width="780" height="490" fill="none" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="6,4" rx="4"/>
  <rect x="420" y="305" width="160" height="22" fill="#9673a6"/>
  <text x="500" y="321" text-anchor="middle" font-size="11" font-weight="bold" fill="white">par (5 workers ‖)</text>

  <!-- Worker A header -->
  <text x="810" y="350" text-anchor="middle" font-size="11" font-style="italic" font-weight="bold" fill="#9673a6">— Worker A: chunk 0  (peer = peers[0 % 2] = Seeder 1) —</text>

  <!-- 5a Handshake -->
  <line x1="510" y1="380" x2="705" y2="380" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="607" y="372" text-anchor="middle" font-size="10" fill="#82b366">5a. RSA Handshake → Fernet key exchange</text>

  <!-- 6a CHUNK request -->
  <line x1="510" y1="408" x2="705" y2="408" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="607" y="400" text-anchor="middle" font-size="10" fill="#82b366">6a. fernet.encrypt(CHUNK request idx=0)</text>

  <!-- 7a response back -->
  <line x1="705" y1="436" x2="520" y2="436" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="612" y="428" text-anchor="middle" font-size="10" fill="#82b366">7a. fernet.encrypt(64KB raw bytes)</text>

  <!-- 8a verify+write -->
  <rect x="430" y="450" width="180" height="36" rx="4" ry="4" fill="#fde8e6" stroke="#B85450"/>
  <text x="520" y="465" text-anchor="middle" font-size="10" fill="#333">8a. SHA-256 ↔ checksums[0]</text>
  <text x="520" y="479" text-anchor="middle" font-size="10" fill="#333">seek(0×64KB) → write</text>
  <line x1="610" y1="468" x2="1110" y2="468" stroke="#B85450" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Worker B header -->
  <text x="810" y="510" text-anchor="middle" font-size="11" font-style="italic" font-weight="bold" fill="#9673a6">— Worker B: chunk 1  (peer = peers[1 % 2] = Seeder 2) —</text>

  <!-- 5b Handshake -->
  <line x1="510" y1="538" x2="905" y2="538" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="707" y="530" text-anchor="middle" font-size="10" fill="#82b366">5b. RSA Handshake → Fernet key exchange</text>

  <!-- 6b CHUNK request -->
  <line x1="510" y1="566" x2="905" y2="566" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="707" y="558" text-anchor="middle" font-size="10" fill="#82b366">6b. fernet.encrypt(CHUNK request idx=1)</text>

  <!-- 7b response back -->
  <line x1="905" y1="594" x2="520" y2="594" stroke="#82b366" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="712" y="586" text-anchor="middle" font-size="10" fill="#82b366">7b. fernet.encrypt(64KB raw bytes)</text>

  <!-- 8b verify+write -->
  <rect x="430" y="608" width="180" height="36" rx="4" ry="4" fill="#fde8e6" stroke="#B85450"/>
  <text x="520" y="623" text-anchor="middle" font-size="10" fill="#333">8b. SHA-256 ↔ checksums[1]</text>
  <text x="520" y="637" text-anchor="middle" font-size="10" fill="#333">seek(1×64KB) → write</text>
  <line x1="610" y1="626" x2="1110" y2="626" stroke="#B85450" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Workers C/D/E -->
  <text x="810" y="680" text-anchor="middle" font-size="11" font-style="italic" fill="#666">— Workers C, D, E run similarly for chunks 2, 3, 4 ... —</text>
  <text x="810" y="700" text-anchor="middle" font-size="10" font-style="italic" fill="#9673a6">(each worker loops over multiple chunks; total_chunks iterations distributed)</text>

  <!-- Step 9: progress lock update -->
  <rect x="430" y="725" width="780" height="40" rx="4" ry="4" fill="#f3e9f7" stroke="#9673a6"/>
  <text x="820" y="740" text-anchor="middle" font-size="11" font-weight="bold" fill="#9673a6" direction="rtl">9. progress_lock (Critical Section):</text>
  <text x="820" y="757" text-anchor="middle" font-size="10" fill="#9673a6" direction="rtl">completed_chunks++  •  calc speed  •  update active_downloads[file_id]</text>

  <!-- Step 10: rename -->
  <line x1="510" y1="820" x2="1110" y2="820" stroke="#B85450" stroke-width="2" marker-end="url(#arRed2)"/>
  <text x="810" y="812" text-anchor="middle" font-size="11" font-weight="bold" fill="#B85450">10. os.rename(part_path → final_path)</text>

  <!-- Step 11/12: Polling -->
  <line x1="125" y1="870" x2="305" y2="870" stroke="#1F4E79" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arBlue)"/>
  <text x="215" y="862" text-anchor="middle" font-size="11" fill="#1F4E79">11. GET /api/data (כל 2 שניות)</text>

  <line x1="305" y1="900" x2="125" y2="900" stroke="#1F4E79" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arBlue)"/>
  <text x="215" y="892" text-anchor="middle" font-size="11" fill="#1F4E79">12. JSON {progress, speed}</text>

  <text x="620" y="935" text-anchor="middle" font-size="10" fill="#888" font-style="italic">→ פס ההתקדמות בדפדפן מתעדכן בזמן אמת</text>
</svg>
