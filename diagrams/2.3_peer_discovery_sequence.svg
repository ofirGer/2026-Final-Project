<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="Arial, David, sans-serif">
  <defs>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF8C00"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B85450"/>
    </marker>
  </defs>
  <rect width="1100" height="920" fill="white"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F4E79" direction="rtl">זרימת מידע 2.3.1 — גילוי עמיתים וניהול טבלת הנחיל</text>

  <!-- Lifeline A (Peer A) -->
  <rect x="100" y="80" width="200" height="60" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="200" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F4E79">Peer A</text>
  <text x="200" y="125" text-anchor="middle" font-size="11" fill="#333">192.168.1.10</text>
  <line x1="200" y1="140" x2="200" y2="860" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Lifeline LAN -->
  <rect x="450" y="80" width="200" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="550" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">LAN Broadcast</text>
  <text x="550" y="120" text-anchor="middle" font-size="10" fill="#333">192.168.1.255:50000</text>
  <text x="550" y="134" text-anchor="middle" font-size="10" fill="#666">UDP Channel</text>
  <line x1="550" y1="140" x2="550" y2="860" stroke="#d6b656" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Lifeline B (Peer B) -->
  <rect x="800" y="80" width="200" height="60" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="900" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1F4E79">Peer B</text>
  <text x="900" y="125" text-anchor="middle" font-size="11" fill="#333">192.168.1.11</text>
  <line x1="900" y1="140" x2="900" y2="860" stroke="#82b366" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Loop frame -->
  <rect x="60" y="170" width="980" height="290" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6,4" rx="4"/>
  <rect x="60" y="170" width="80" height="22" fill="#888"/>
  <text x="100" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="white">loop</text>
  <text x="160" y="186" font-size="11" font-style="italic" fill="#666" direction="rtl">כל 5 שניות (broadcast_presence)</text>

  <!-- Message 1: A → LAN -->
  <line x1="200" y1="220" x2="540" y2="220" stroke="#FF8C00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="370" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8C00">1. fernet.encrypt(JSON{peer_id, files, ts})</text>

  <!-- Message 1b: LAN → B -->
  <line x1="560" y1="240" x2="890" y2="240" stroke="#FF8C00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="725" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8C00">2. UDP delivery</text>

  <!-- Note for Peer B processing -->
  <rect x="800" y="255" width="200" height="48" rx="4" ry="4" fill="#eaf5ea" stroke="#82b366" stroke-width="1"/>
  <text x="900" y="272" text-anchor="middle" font-size="10" fill="#333" direction="rtl">3. decrypt(Fernet) + check ts&lt;10s</text>
  <text x="900" y="290" text-anchor="middle" font-size="10" fill="#333" direction="rtl">→ update peer_table[A]</text>

  <!-- Message 2: B → LAN -->
  <line x1="890" y1="340" x2="560" y2="340" stroke="#FF8C00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="725" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8C00">4. fernet.encrypt(JSON{peer_id, files, ts})</text>

  <!-- Message 2b: LAN → A -->
  <line x1="540" y1="360" x2="210" y2="360" stroke="#FF8C00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="375" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8C00">5. UDP delivery</text>

  <!-- Note for Peer A processing -->
  <rect x="100" y="375" width="200" height="48" rx="4" ry="4" fill="#e1ecf7" stroke="#6c8ebf" stroke-width="1"/>
  <text x="200" y="392" text-anchor="middle" font-size="10" fill="#333" direction="rtl">6. decrypt(Fernet) + check ts&lt;10s</text>
  <text x="200" y="410" text-anchor="middle" font-size="10" fill="#333" direction="rtl">→ update peer_table[B]</text>

  <!-- Bad packet section -->
  <rect x="60" y="490" width="980" height="100" fill="none" stroke="#B85450" stroke-width="1" stroke-dasharray="6,4" rx="4"/>
  <rect x="60" y="490" width="100" height="22" fill="#B85450"/>
  <text x="110" y="506" text-anchor="middle" font-size="11" font-weight="bold" fill="white">attack</text>
  <text x="180" y="506" font-size="11" font-style="italic" fill="#B85450" direction="rtl">חבילה זרה / Replay Attack</text>

  <line x1="540" y1="540" x2="210" y2="540" stroke="#B85450" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="375" y="532" text-anchor="middle" font-size="11" fill="#B85450" font-weight="bold">חבילה זרה (נחיל אחר) או timestamp&gt;10s</text>

  <rect x="100" y="555" width="200" height="30" rx="4" ry="4" fill="#f8cecc" stroke="#B85450" stroke-width="1"/>
  <text x="200" y="574" text-anchor="middle" font-size="11" font-weight="bold" fill="#B85450" direction="rtl">❌ drop silently</text>

  <!-- Cleanup section -->
  <text x="550" y="640" text-anchor="middle" font-size="12" font-style="italic" fill="#666" direction="rtl">— תהליכון cleanup_peers, רץ במקביל בשני הצדדים —</text>

  <rect x="100" y="660" width="200" height="50" rx="4" ry="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="200" y="678" text-anchor="middle" font-size="10" font-style="italic" fill="#555" direction="rtl">cleanup_peers() כל 5 שניות:</text>
  <text x="200" y="698" text-anchor="middle" font-size="10" fill="#555" direction="rtl">מחק last_seen &gt; 15s</text>

  <rect x="800" y="660" width="200" height="50" rx="4" ry="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="900" y="678" text-anchor="middle" font-size="10" font-style="italic" fill="#555" direction="rtl">cleanup_peers() כל 5 שניות:</text>
  <text x="900" y="698" text-anchor="middle" font-size="10" fill="#555" direction="rtl">מחק last_seen &gt; 15s</text>

  <!-- Self-loops -->
  <path d="M 200 720 Q 250 730 200 745" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrOrange)" stroke-dasharray="3,3"/>
  <path d="M 900 720 Q 950 730 900 745" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrOrange)" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="280" y="800" width="540" height="80" rx="4" ry="4" fill="#fafafa" stroke="#cccccc"/>
  <text x="800" y="820" text-anchor="end" font-size="13" font-weight="bold" fill="#1F4E79" direction="rtl">מקרא:</text>
  <line x1="300" y1="836" x2="350" y2="836" stroke="#FF8C00" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="800" y="841" text-anchor="end" font-size="11" fill="#FF8C00" direction="rtl">UDP Broadcast מוצפן Fernet</text>
  <line x1="300" y1="855" x2="350" y2="855" stroke="#B85450" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="800" y="860" text-anchor="end" font-size="11" fill="#B85450" direction="rtl">חבילה שנדחתה (InvalidToken / Replay)</text>
  <text x="800" y="876" text-anchor="end" font-size="10" fill="#666" font-style="italic" direction="rtl">Anti-Replay: כל חבילה כוללת timestamp מוצפן; הפרש &gt; 10 שניות → דחייה</text>
</svg>
