<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Sharer</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        h1, h2 { color: #333; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }

        /* List Styles */
        ul { list-style-type: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }

        /* Buttons */
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-success:hover { background-color: #218838; }

        /* Remove Button Style (Black Outline) */
        .remove-btn {
            background-color: white;
            color: black;
            border: 1px solid black;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
            line-height: 23px;
            text-align: center;
            padding: 0;
            margin-left: 10px;
            transition: background-color 0.2s;
        }
        .remove-btn:hover {
            background-color: #cccccc;
        }

        .badge { background: #e2e6ea; padding: 4px 8px; border-radius: 12px; font-size: 0.85em; }

        /* Progress Bar Styles */
        .progress-container { width: 100%; background-color: #eee; border-radius: 5px; height: 10px; margin-top: 5px; }
        .progress-bar { background-color: #28a745; height: 100%; border-radius: 5px; transition: width 0.5s ease; }
    </style>
    <script>
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function updateDashboard() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                // 1. Update Network Files List
                const networkList = document.getElementById('network-files-list');
                networkList.innerHTML = '';

                // Track if we found any files
                let foundFiles = false;

                // FIXED: Iterate using file_id as the key, and read meta.filename
                for (const [peerId, peerData] of Object.entries(data.peers)) {
                    for (const [file_id, meta] of Object.entries(peerData.files)) {
                        foundFiles = true;
                        networkList.innerHTML += `
                            <li>
                                <div>
                                    <strong>${meta.filename}</strong> <br>
                                    <small style="color: #666;">Size: ${formatBytes(meta.size)} | Peer: ${peerData.ip}</small>
                                </div>
                                <form action="/download" method="post">
                                    <input type="hidden" name="file_id" value="${file_id}">
                                    <button type="submit" class="btn-success">Download ⬇️</button>
                                </form>
                            </li>`;
                    }
                }

                if (!foundFiles) {
                    networkList.innerHTML = '<li style="color: #666; justify-content: center;">No files found on network yet.</li>';
                }

                // 2. Update My Shared Files List
                const myFilesList = document.getElementById('my-files-list');
                myFilesList.innerHTML = '';

                // FIXED: Iterate using file_id and set the hidden input correctly
                for (const [file_id, meta] of Object.entries(data.my_files)) {
                    myFilesList.innerHTML += `
                        <li>
                            <span>${meta.filename}</span>
                            <div style="display: flex; align-items: center;">
                                <span class="badge">${formatBytes(meta.size)}</span>
                                <form action="/remove" method="post" style="margin: 0;">
                                    <input type="hidden" name="file_id" value="${file_id}">
                                    <button type="submit" class="remove-btn" title="Remove File">×</button>
                                </form>
                            </div>
                        </li>`;
                }

                // 3. Update Active Downloads List
                const downloadList = document.getElementById('download-list');
                downloadList.innerHTML = '';

                const downloads = data.downloads || {};

                if (Object.keys(downloads).length === 0) {
                     downloadList.innerHTML = '<li style="color: #666; justify-content: center;">No active downloads</li>';
                } else {
                    // FIXED: Handle the new active_downloads dictionary structure { file_id: {filename: "...", progress: 45} }
                    for (const [file_id, downloadInfo] of Object.entries(downloads)) {
                        downloadList.innerHTML += `
                            <li style="display: block;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                    <strong>${downloadInfo.filename}</strong>
                                    <span>${downloadInfo.progress}%</span>
                                </div>
                                <div class="progress-container">
                                    <div class="progress-bar" style="width: ${downloadInfo.progress}%;"></div>
                                </div>
                            </li>`;
                    }
                }

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Auto-refresh every 2 seconds
        setInterval(updateDashboard, 2000);

        // Run immediately on load
        window.onload = updateDashboard;
    </script>
</head>
<body>
    <h1>🚀 P2P File Sharer</h1>

    <div class="container">
        <h2>⬇️ Active Downloads</h2>
        <ul id="download-list">
            <li style="color: #666; justify-content: center;">Loading...</li>
        </ul>
    </div>

    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <h2>📂 My Shared Files</h2>
        <form action="/select_file" method="post">
            <button type="submit" class="btn-primary">+ Add File</button>
        </form>
    </div>

    <div class="container">
        <ul id="my-files-list">
             {% for file_id, meta in my_files.items() %}
             <li>
                 <span>{{ meta.filename }}</span>
                 <div style="display: flex; align-items: center;">
                     <span class="badge">{{ meta.size }} bytes</span>
                     <form action="/remove" method="post" style="margin: 0;">
                         <input type="hidden" name="file_id" value="{{ file_id }}">
                         <button type="submit" class="remove-btn">×</button>
                     </form>
                 </div>
             </li>
             {% endfor %}
        </ul>
    </div>

    <div class="container">
        <h2>🌐 Network Files (Downloadable)</h2>
        <ul id="network-files-list">
            <li style="color: #666; justify-content: center;">Scanning for peers...</li>
        </ul>
    </div>
</body>
</html>
