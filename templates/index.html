<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG P2P Sharer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>

    <div class="navbar">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                <polyline points="2 17 12 22 22 17"></polyline>
                <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
            OG P2P
        </h1>
    </div>

    <div class="container">
        <div style="display: flex; flex-direction: column; gap: 25px;">

            <div class="card">
                <div class="card-header">
                    <h2>Active Downloads</h2>
                </div>
                <ul id="download-list">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>My Shared Files</h2>
                    <form action="/select_file" method="post" style="margin:0;">
                        <button type="submit" class="btn-primary">+ Add File</button>
                    </form>
                </div>
                <ul id="my-files-list">
                    {% for file_id, meta in my_files.items() %}
                    <li>
                        <div class="file-info">
                            <a href="/open/{{ file_id }}" target="_blank" class="file-name">{{ meta.filename }}</a>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>

        </div>

        <div class="card">
            <div class="card-header">
                <h2>Network Files</h2>
            </div>
            <ul id="network-files-list">
                <li class="empty-state">Scanning for peers...</li>
            </ul>
        </div>
    </div>

</body>
</html>
